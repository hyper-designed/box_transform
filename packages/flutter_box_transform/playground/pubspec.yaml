name: playground
description: A new Flutter project.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 0.1.0+1

environment:
  sdk: ^3.6.0
  flutter: ">=3.27.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  adaptive_theme: ^3.7.0
  url_launcher: ^6.3.0
  provider: ^6.1.5
  equatable: ^2.0.7
  dart_style: ^3.1.0
  vector_math: ^2.1.4
  file_picker: ^11.0.0
  flutter_box_transform:
    path: ../

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/ic_flip.png
    - assets/images/image1.jpg
